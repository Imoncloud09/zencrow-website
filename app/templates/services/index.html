{% extends "base.html" %}

{% block title %}Services{% endblock %}

{% block content %}
<h1 class="mb-4">Our Services</h1>

<div class="row g-4">
    {% for service in services %}
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-body">
                <h3 class="card-title">{{ service.title }}</h3>
                <p class="card-text">{{ service.description }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
